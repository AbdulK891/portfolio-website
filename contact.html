<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Portfolio</title>
  <link rel="stylesheet" href="css/style.css" />

  <style>
    .contact-container {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 2rem;
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      align-items: start;
    }

    @media (max-width: 768px) {
      .contact-container {
        grid-template-columns: 1fr;
      }

      .divider {
        display: none;
      }
    }

    .contact-form {
      background-color: #1e1e1e;
      padding: 1.5rem;
      border-radius: 8px;
    }

    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: #e0e0e0;
      font-family: 'Lato', sans-serif;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.6rem;
      border: none;
      border-radius: 4px;
      background-color: #2c2c2c;
      color: #e0e0e0;
      font-family: 'Lato', sans-serif;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border: 1px solid #64b5f6;
    }

    .submit-btn {
      background-color: #64b5f6;
      color: #121212;
      padding: 0.7rem 1.5rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      font-family: 'Lato', sans-serif;
    }
    .submit-btn:hover {
      background-color: #90caf9;
    }

    .contact-info {
      color: #e0e0e0;
      font-family: 'Lato', sans-serif;
      line-height: 1.6;
      margin-top: 2rem; /* slight downward shift */
    }

    .contact-info p {
      margin-bottom: 0.8rem;
    }

    .thank-you {
      background-color: #2d2d2d;
      color: #90caf9;
      padding: 1rem;
      border-radius: 8px;
      text-align: center;
      margin-top: 1rem;
      font-family: 'Lato', sans-serif;
    }

    .section-title {
      text-align: center;
      font-family: 'Lato', sans-serif;
      margin-bottom: 2rem;
    }

    .divider {
      width: 1px;
      background-color: #444;
      height: 100%;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <ul class="nav-list">
      <li><a href="index.html" class="nav-item">Home</a></li>
      <li><a href="projects.html" class="nav-item">Projects</a></li>
      <li><a href="experience.html" class="nav-item">Experience</a></li>
      <li><a href="skills.html" class="nav-item">Skills</a></li>
      <li><a href="resume.html" class="nav-item">Resume</a></li>
      <li><a href="contact.html" class="nav-item active">Contact</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <h2 class="section-title">Get in Touch</h2>
  <main class="contact-container">
    <!-- LEFT: Contact Form -->
    <div>
      <div class="contact-form">
        <form id="contact-form" action="https://script.google.com/macros/s/AKfycbw2lNOcwsDC_RZfyf_KseWL72CmoCwJMvqZSNXToiYg5VUJl16xwsN4fMkFgopjHTfULg/exec" method="POST">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required/>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required/>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required/>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>

          <input type="hidden" id="timestamp" name="timestamp" />
          <input type="hidden" id="location" name="location" />

          <button type="submit" class="submit-btn">Send Message</button>
        </form>
        <div id="thank-you" class="thank-you" style="display: none;">
          Thank you! Your message has been received.
        </div>
      </div>
    </div>

    <!-- MIDDLE: Vertical Divider -->
    <div class="divider"></div>

    <!-- RIGHT: Contact Info / Links -->
    <div class="contact-info">
      <p><strong>Phone:</strong> (732)803-2566</p>
      <p><strong>Email:</strong> <a href="mailto:abdul-khayyum.981@gmail.com">abdul-khayyum.981@gmail.com</a></p>
      <p><strong>LinkedIn:</strong> 
        <a href="https://www.linkedin.com/in/abdul-khayyum-farooqui/" target="_blank">
          linkedin.com/in/abdul-khayyum-farooqui
        </a>
      </p>
      <p><strong>GitHub:</strong> 
        <a href="https://github.com/abdulk891" target="_blank">
          github.com/abdulk891
        </a>
      </p>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("contact-form");
      const timestampInput = document.getElementById("timestamp");
      const locationInput  = document.getElementById("location");
      const thankYouDiv    = document.getElementById("thank-you");

      timestampInput.value = new Date().toISOString();

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            locationInput.value = 
              pos.coords.latitude.toFixed(4) + ", " + pos.coords.longitude.toFixed(4);
          },
          () => {
            locationInput.value = "Not provided";
          }
        );
      } else {
        locationInput.value = "Geolocation not supported";
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const formData = new FormData(form);

        fetch(form.action, {
          method: "POST",
          body: formData
        })
        .then((resp) => resp.json())
        .then((data) => {
          if (data.result === "success") {
            thankYouDiv.style.display = "block";
            setTimeout(() => {
              form.reset();
              timestampInput.value = new Date().toISOString();
              locationInput.value = "Not provided";
              thankYouDiv.style.display = "none";
            }, 2000);
          } else {
            alert("Error sending form: " + data.message);
          }
        })
        .catch((err) => {
          console.error(err);
          alert("There was a problem submitting the form. Please try again later.");
        });
      });
    });
  </script>
</body>
</html>
