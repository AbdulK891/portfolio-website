<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Portfolio</title>
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ---------------------------------------------
       CONTACT PAGE SPECIFIC STYLES
    ---------------------------------------------- */

    /* Center the title across the full width */
    .contact-title {
      text-align: center;
      font-size: 2rem;
      margin-top: 2rem;
      margin-bottom: 1.5rem;
      color: #e0e0e0;
      font-family: 'Lora', serif;
    }

    /*
      Use flexbox so that the two columns (form + info)
      have independent vertical alignment. The container
      itself will be flex-start, so children start at the top,
      then we manually push the right column down to 10% of vh.
    */
    .contact-container {
      display: flex;
      justify-content: center;
      align-items: flex-start; /* Children start at top */
      gap: 2rem;
      max-width: 960px;
      margin: 0 auto 2rem; /* center horizontally, add bottom margin */
      padding: 0 1rem;
    }

    @media (max-width: 768px) {
      .contact-container {
        flex-direction: column;
      }
      /* On mobile, remove the divider and reset margins */
      .contact-info {
        border-left: none;
        padding-left: 0;
        margin-top: 2rem;
      }
    }

    /* LEFT COLUMN: Contact Form stays at top */
    .contact-form {
      background-color: #1e1e1e;
      padding: 1.5rem;
      border-radius: 8px;
      flex: 1 1 350px;    /* allow it to grow/shrink; min-width 350px */
      max-width: 400px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      color: #e0e0e0;
      font-family: 'Lato', sans-serif;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.6rem;
      border: none;
      border-radius: 4px;
      background-color: #2c2c2c;
      color: #e0e0e0;
      font-family: 'Lato', sans-serif;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border: 1px solid #64b5f6;
    }

    .submit-btn {
      background-color: #64b5f6;
      color: #121212;
      padding: 0.7rem 1.5rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
      font-family: 'Lato', sans-serif;
      margin-top: 0.5rem;
    }
    .submit-btn:hover {
      background-color: #90caf9;
    }

    /* RIGHT COLUMN: Contact Info pushed down to 10vh */
    .contact-info {
      color: #e0e0e0;
      font-family: 'Lato', sans-serif;
      line-height: 1.6;
      flex: 1 1 250px;    /* allow it to grow/shrink; min-width 250px */
      max-width: 350px;
      text-align: left;

      /* Vertical divider line on desktop */
      border-left: 1px solid #333;
      padding-left: 1.5rem;

      /* Push down by 10vh (moved up from 15vh) */
      margin-top: 10vh;
    }
    .contact-info p {
      margin-bottom: 0.8rem;
      word-wrap: break-word;
    }
    .contact-info a {
      color: #64b5f6;
      text-decoration: none;
    }
    .contact-info a:hover {
      text-decoration: underline;
    }

    /* “Thank You” message that appears after submission */
    .thank-you {
      background-color: #2d2d2d;
      color: #90caf9;
      padding: 1rem;
      border-radius: 8px;
      text-align: center;
      margin-top: 1rem;
      font-family: 'Lato', sans-serif;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar (unchanged) -->
  <nav class="navbar">
    <ul class="nav-list">
      <li><a href="index.html" class="nav-item">Home</a></li>
      <li><a href="projects.html" class="nav-item">Projects</a></li>
      <li><a href="experience.html" class="nav-item">Experience</a></li>
      <li><a href="skills.html" class="nav-item">Skills</a></li>
      <li><a href="resume.html" class="nav-item">Resume</a></li>
      <li><a href="contact.html" class="nav-item active">Contact</a></li>
    </ul>
  </nav>

  <!-- Page Title (centered) -->
  <h2 class="contact-title">Get in Touch</h2>

  <!-- Container for both columns (form + info) -->
  <div class="contact-container">
    <!-- LEFT COLUMN: Contact Form (at top of container) -->
    <div class="contact-form">
      <form id="contact-form" action="YOUR_SCRIPT_URL_HERE" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" required />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <!-- Hidden fields for timestamp & location -->
        <input type="hidden" id="timestamp" name="timestamp" />
        <input type="hidden" id="location" name="location" />

        <button type="submit" class="submit-btn">Send Message</button>
      </form>

      <!-- Thank You message, hidden by default -->
      <div id="thank-you" class="thank-you" style="display: none;">
        Thank you! Your message has been received.
      </div>
    </div>

    <!-- RIGHT COLUMN: Your Contact Information (pushed down to 10vh) -->
    <div class="contact-info">
      <p><strong>Email:</strong> 
        <a href="mailto:abdul-khayyum.981@gmail.com">
          abdul-khayyum.981@gmail.com
        </a>
      </p>
      <p><strong>Phone:</strong> 
        <a href="tel:+17328032566">(732) 803-2566</a>
      </p>
      <p><strong>LinkedIn:</strong> 
        <a href="https://www.linkedin.com/in/abdul-khayyum-farooqui/" target="_blank">
          linkedin.com/in/abdul-khayyum-farooqui
        </a>
      </p>
      <p><strong>GitHub:</strong> 
        <a href="https://github.com/abdulk891" target="_blank">
          github.com/abdulk891
        </a>
      </p>
    </div>
  </div>

  <!-- SCRIPT: Populate hidden fields & handle submission -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("contact-form");
      const timestampInput = document.getElementById("timestamp");
      const locationInput  = document.getElementById("location");
      const thankYouDiv    = document.getElementById("thank-you");

      // 1) Populate timestamp
      timestampInput.value = new Date().toISOString();

      // 2) Attempt geolocation
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            locationInput.value =
              pos.coords.latitude.toFixed(4) + ", " + pos.coords.longitude.toFixed(4);
          },
          () => {
            locationInput.value = "Not provided";
          }
        );
      } else {
        locationInput.value = "Geolocation not supported";
      }

      // 3) Intercept form submission so we can show a “Thank you” note
      form.addEventListener("submit", (e) => {
        e.preventDefault();

        // Use Fetch to POST the form data to your Apps Script endpoint
        const formData = new FormData(form);
        fetch(form.action, {
          method: "POST",
          body: formData
        })
        .then((resp) => resp.json())
        .then((data) => {
          if (data.result === "success") {
            // Show “Thank you” message
            thankYouDiv.style.display = "block";
            // Clear the form after a short delay
            setTimeout(() => {
              form.reset();
              // Re‐populate timestamp for next submission
              timestampInput.value = new Date().toISOString();
              locationInput.value = "Not provided";
              thankYouDiv.style.display = "none";
            }, 2000);
          } else {
            alert("Error sending form: " + data.message);
          }
        })
        .catch((err) => {
          console.error(err);
          alert("There was a problem submitting the form. Please try again later.");
        });
      });
    });
  </script>
</body>
</html>
