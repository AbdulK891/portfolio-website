<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume | Portfolio</title>

  <!-- Your existing global CSS (if any) -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Inline CSS specific to this page -->
  <style>
    :root {
      --button-bg: #64b5f6;
      --button-hover: #90caf9;
      --button-color: #121212;
    }

    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Lato', sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Container for the entire resume section */
    .resume-container {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      text-align: center;
    }

    /* Grouping for the two buttons */
    .button-group {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* Styling for both Download & Fullscreen buttons */
    .action-btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      color: var(--button-color);
      background-color: var(--button-bg);
      border: none;
      border-radius: 4px;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .action-btn:hover {
      background-color: var(--button-hover);
    }

    /* This <div> will contain rendered PDF pages */
    #pdf-container {
      border: 1px solid #333;
      border-radius: 8px;
      overflow-y: auto;
      background-color: #1e1e1e;
      padding: 1rem;
      max-height: 80vh;
    }

    /* Each PDF page is drawn into a <canvas> with this class */
    .pdf-page-canvas {
      margin: 1rem auto;
      display: block;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      border: 1px solid #444;
    }

    @media (max-width: 768px) {
      #pdf-container {
        max-height: 60vh;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar (existing site nav) -->
  <nav class="navbar">
    <ul class="nav-list">
      <li><a href="index.html" class="nav-item">Home</a></li>
      <li><a href="projects.html" class="nav-item">Projects</a></li>
      <li><a href="experience.html" class="nav-item">Experience</a></li>
      <li><a href="skills.html" class="nav-item">Skills</a></li>
      <li><a href="resume.html" class="nav-item active">Resume</a></li>
      <li><a href="contact.html" class="nav-item">Contact</a></li>
    </ul>
  </nav>

  <!-- Main Resume Section -->
  <main class="resume-container">
    <h2 class="section-title">Resume</h2>

    <!-- BUTTONS: Download PDF and Fullscreen -->
    <div class="button-group">
      <!-- 1) Download button -->
      <a href="my_resume.pdf" download class="action-btn">
        Download Resume
      </a>
      <!-- 2) Fullscreen button -->
      <button id="fullscreen-btn" class="action-btn">
        View Full Screen
      </button>
    </div>

    <!-- PDF.js will render pages inside this container -->
    <div id="pdf-container">
      <!-- If PDF.js fails, we’ll show a fallback below via script -->
    </div>
  </main>

  <!-- 1. PDF.js library from a CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>
    // 2. Tell PDF.js where its worker script lives (also from CDN)
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
  </script>

  <!-- 3. Script to load & render the PDF pages -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const url = "my_resume.pdf";       // path to your PDF file
      const container = document.getElementById("pdf-container");

      // Attempt to load the PDF document
      pdfjsLib.getDocument(url).promise
        .then(pdfDoc => {
          // Loop through all pages and render each into a <canvas>
          for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
            pdfDoc.getPage(pageNum).then(page => {
              const viewport = page.getViewport({ scale: 1.2 }); 
              // You can adjust 'scale' for larger/smaller rendering

              // Create a new canvas for this page
              const canvas = document.createElement("canvas");
              canvas.classList.add("pdf-page-canvas");
              canvas.height = viewport.height;
              canvas.width = viewport.width;
              container.appendChild(canvas);

              // Render the PDF page into the canvas
              const context = canvas.getContext("2d");
              const renderContext = {
                canvasContext: context,
                viewport: viewport
              };
              page.render(renderContext);
            });
          }
        })
        .catch(err => {
          // PDF loading failed (e.g., file not found or cross‐origin issue)
          console.error("Error loading PDF:", err);
          container.innerHTML = `
            <p style="color: #e0e0e0;">
              Unable to load resume. 
              <a href="my_resume.pdf" download style="color: var(--button-bg);">
                Download it here
              </a>.
            </p>`;
        });

      // 4. FULLSCREEN BUTTON LOGIC
      const fsBtn = document.getElementById("fullscreen-btn");
      fsBtn.addEventListener("click", () => {
        // Make the #pdf-container element go full‐screen
        if (container.requestFullscreen) {
          container.requestFullscreen();
        } else if (container.webkitRequestFullscreen) {
          container.webkitRequestFullscreen();
        } else if (container.msRequestFullscreen) {
          container.msRequestFullscreen();
        }
      });
    });
  </script>
</body>
</html>
