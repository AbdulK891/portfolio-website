<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume | Portfolio</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ---------------------------------------------
       Simple styling for the Download and Fullscreen buttons
    ---------------------------------------------- */
    .resume-container {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      text-align: center;
    }

    .button-group {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .action-btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      font-family: var(--body-font, Arial, sans-serif);
      font-size: 1rem;
      color: #121212;
      background-color: #64b5f6;
      border: none;
      border-radius: 4px;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .action-btn:hover {
      background-color: #90caf9;
    }

    /* Ensure the iframe takes most of the viewport height */
    .resume-embed {
      width: 100%;
      height: 80vh;
      border: 1px solid #333;
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .resume-embed {
        height: 60vh;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <ul class="nav-list">
      <li><a href="index.html" class="nav-item">Home</a></li>
      <li><a href="projects.html" class="nav-item">Projects</a></li>
      <li><a href="experience.html" class="nav-item">Experience</a></li>
      <li><a href="skills.html" class="nav-item">Skills</a></li>
      <li><a href="resume.html" class="nav-item active">Resume</a></li>
      <li><a href="contact.html" class="nav-item">Contact</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="resume-container">
    <h2 class="section-title">Resume</h2>

    <!-- BUTTONS: Download and Fullscreen -->
    <div class="button-group">
      <!-- Download Resume Button -->
      <a href="my_resume.pdf" download class="action-btn">
        Download Resume
      </a>
      <!-- Fullscreen Button -->
      <button id="fullscreen-btn" class="action-btn">
        View Full Screen
      </button>
    </div>

    <!-- EMBEDDED PDF (hides toolbar via URL parameters) -->
    <iframe 
      id="resume-iframe"
      src="my_resume.pdf#toolbar=0&navpanes=0&scrollbar=0" 
      class="resume-embed"
    >
      Your browser does not support embedding PDFs.  
      You can <a href="my_resume.pdf" download>download the resume here</a>.
    </iframe>
  </main>

  <script>
    // ---------------------------------------------
    // FULLSCREEN BUTTON LOGIC
    // ---------------------------------------------
    document.addEventListener("DOMContentLoaded", () => {
      const fsBtn = document.getElementById("fullscreen-btn");
      const iframe = document.getElementById("resume-iframe");

      fsBtn.addEventListener("click", () => {
        if (iframe.requestFullscreen) {
          iframe.requestFullscreen();
        } else if (iframe.webkitRequestFullscreen) {
          iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) {
          iframe.msRequestFullscreen();
        }
      });
    });
  </script>
</body>
</html>
