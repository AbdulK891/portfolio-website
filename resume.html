<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume | Portfolio</title>

  <!-- Your global CSS (if you have it) -->
  <link rel="stylesheet" href="css/style.css" />

  <style>
    :root {
      --button-bg: #64b5f6;
      --button-hover: #90caf9;
      --button-color: #121212;
    }

    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Lato', sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Container for everything */
    .resume-container {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      text-align: center;
    }

    /* Button group */
    .button-group {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* Download & Fullscreen buttons */
    .action-btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      color: var(--button-color);
      background-color: var(--button-bg);
      border: none;
      border-radius: 4px;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .action-btn:hover {
      background-color: var(--button-hover);
    }

    /* The embedded PDF container */
    #pdf-container {
      position: relative;
      width: 100%;
      height: 80vh;
      border: 1px solid #333;
      border-radius: 8px;
      background-color: #1e1e1e;
      overflow: hidden;
    }

    /* The <embed> inside, filling its parent */
    #pdf-embed {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 768px) {
      #pdf-container {
        height: 60vh;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <ul class="nav-list">
      <li><a href="index.html" class="nav-item">Home</a></li>
      <li><a href="projects.html" class="nav-item">Projects</a></li>
      <li><a href="experience.html" class="nav-item">Experience</a></li>
      <li><a href="skills.html" class="nav-item">Skills</a></li>
      <li><a href="resume.html" class="nav-item active">Resume</a></li>
      <li><a href="contact.html" class="nav-item">Contact</a></li>
    </ul>
  </nav>

  <!-- Main Resume Section -->
  <main class="resume-container">
    <h2 class="section-title">Resume</h2>

    <!-- Buttons: Download + Fullscreen -->
    <div class="button-group">
      <!-- 1) Download button -->
      <a href="my_resume.pdf" download class="action-btn">
        Download Resume
      </a>
      <!-- 2) Fullscreen button -->
      <button id="fullscreen-btn" class="action-btn">
        View Full Screen
      </button>
    </div>

    <!-- Embedded PDF (no PDF.js needed) -->
    <div id="pdf-container">
      <!-- The "#toolbar=0&navpanes=0" fragment hides the browser’s default PDF controls -->
      <embed 
        id="pdf-embed"
        src="my_resume.pdf#toolbar=0&navpanes=0"
        type="application/pdf"
      >
      <!-- If the browser can’t display an embed, show a fallback link: -->
      <p style="color: #e0e0e0; padding: 1rem;">
        Your browser can’t display the resume inline. 
        <a href="my_resume.pdf" download style="color: var(--button-bg);">
          Download it here
        </a>.
      </p>
    </div>
  </main>

  <script>
    // Fullscreen logic for the #pdf-container
    document.addEventListener("DOMContentLoaded", () => {
      const fsBtn = document.getElementById("fullscreen-btn");
      const container = document.getElementById("pdf-container");

      fsBtn.addEventListener("click", () => {
        if (container.requestFullscreen) {
          container.requestFullscreen();
        } else if (container.webkitRequestFullscreen) {
          container.webkitRequestFullscreen();
        } else if (container.msRequestFullscreen) {
          container.msRequestFullscreen();
        }
      });
    });
  </script>
</body>
</html>
