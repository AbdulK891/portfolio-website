<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume | Portfolio</title>

  <!-- Your existing global CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Inline CSS for this page (buttons + PDF container) -->
  <style>
    :root {
      --button-bg: #64b5f6;
      --button-hover: #90caf9;
      --button-color: #121212;
    }

    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Lato', sans-serif;
    }

    .resume-container {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      text-align: center;
    }

    .button-group {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .action-btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      color: var(--button-color);
      background-color: var(--button-bg);
      border: none;
      border-radius: 4px;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    .action-btn:hover {
      background-color: var(--button-hover);
    }

    /* Container for rendered PDF pages */
    #pdf-container {
      border: 1px solid #333;
      border-radius: 8px;
      overflow-y: auto;
      background-color: #1e1e1e;
      padding: 1rem;
      max-height: 80vh;
    }

    /* Each canvas (PDF page) sits centered */
    .pdf-page-canvas {
      margin: 1rem auto;
      display: block;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      border: 1px solid #444;
    }

    @media (max-width: 768px) {
      #pdf-container {
        max-height: 60vh;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <ul class="nav-list">
      <li><a href="index.html" class="nav-item">Home</a></li>
      <li><a href="projects.html" class="nav-item">Projects</a></li>
      <li><a href="experience.html" class="nav-item">Experience</a></li>
      <li><a href="skills.html" class="nav-item">Skills</a></li>
      <li><a href="resume.html" class="nav-item active">Resume</a></li>
      <li><a href="contact.html" class="nav-item">Contact</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="resume-container">
    <h2 class="section-title">Resume</h2>

    <!-- BUTTONS: Download and Fullscreen -->
    <div class="button-group">
      <!-- Download Resume Button -->
      <a href="my_resume.pdf" download class="action-btn">
        Download Resume
      </a>
      <!-- Fullscreen Button -->
      <button id="fullscreen-btn" class="action-btn">
        View Full Screen
      </button>
    </div>

    <!-- PDF.js render container (no default toolbar here) -->
    <div id="pdf-container"></div>
  </main>

  <!-- PDF.js library -->
  <script src="pdfjs/pdf.min.js"></script>
  <!-- If you stored the worker in a different path, adjust accordingly -->
  <script>
    // Tell PDF.js where to find its worker script
    pdfjsLib.GlobalWorkerOptions.workerSrc = "pdfjs/pdf.worker.min.js";
  </script>

  <!-- Script to load & render the PDF pages -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const url = "my_resume.pdf"; // path to your PDF file
      const container = document.getElementById("pdf-container");

      // Load the PDF document
      pdfjsLib.getDocument(url).promise.then(pdfDoc => {
        // For each page, create a <canvas> and render it
        for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
          pdfDoc.getPage(pageNum).then(page => {
            const viewport = page.getViewport({ scale: 1.25 }); 
            // Adjust scale (1.25) for clarity; change as needed

            const canvas = document.createElement("canvas");
            canvas.classList.add("pdf-page-canvas");
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            container.appendChild(canvas);

            const context = canvas.getContext("2d");
            const renderContext = {
              canvasContext: context,
              viewport: viewport
            };
            page.render(renderContext);
          });
        }
      }).catch(err => {
        console.error("Error loading PDF:", err);
        container.textContent = "Failed to load resume.";
      });

      // Fullscreen button logic
      const fsBtn = document.getElementById("fullscreen-btn");
      fsBtn.addEventListener("click", () => {
        if (container.requestFullscreen) {
          container.requestFullscreen();
        } else if (container.webkitRequestFullscreen) {
          container.webkitRequestFullscreen();
        } else if (container.msRequestFullscreen) {
          container.msRequestFullscreen();
        }
      });
    });
  </script>
</body>
</html>
